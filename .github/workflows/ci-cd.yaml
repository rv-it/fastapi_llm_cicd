name: CI/CD Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
  
    steps:
      # transmit repo to the runner
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98  # v6.0.2

      - name: Install Python
        uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec # v6.2.0
        with:
          python-version: 3.12
    
      - name: Install dependencies 
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: run tests
        run: |
          source venv/bin/activate
          pytest --maxfail=1 --disable-warnings -q
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@bb0e4e1bb14abddfe1fa03905880f78116916327 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up QEMU # installe QEMU sur le runner pour émuler d’autres architectures (runner amd64)
        uses: docker/setup-qemu-action@a3a541afbc519b40032fc3451382e369d05da204 # v3.7

      - name: Set up Docker Buildx # pour builder des images multi-arch
        uses: docker/setup-buildx-action@b278ce4ad9693f79d252f93570b663b9767e436b #v3.12.0

      - name: Build and push multi-arch image # -- push -> vers le registre GHCR ou a été tagé l'image, . pour Dockerfile
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/fastapi-llm:latest \
            --push .

      - name: Deployment
        run: echo "Deployment is handled on the Raspberry Pi via GHCR pull"